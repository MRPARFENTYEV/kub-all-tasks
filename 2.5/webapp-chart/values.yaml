# Общие настройки окружения
namespace: default

frontend:
  name: frontend
  replicaCount: 1
  image:
    repository: nginx
    tag: "1.27"
    pullPolicy: IfNotPresent
  service:
    port: 80

backend:
  name: backend
  replicaCount: 1
  image:
    repository: wbitt/network-multitool
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  env:
    httpPort: "8080"
    httpsPort: "8443"
