apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-volume
  labels:
    app: shared-volume
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-volume
  template:
    metadata:
      labels:
        app: shared-volume
    spec:
      volumes:
        - name: shared-data
          emptyDir: {}
      containers:
        - name: busybox
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              i=0
              while true; do
                echo "$(date -Iseconds) message #$i" >> /shared/data.log
                i=$((i + 1))
                sleep 5
              done
          volumeMounts:
            - name: shared-data
              mountPath: /shared
        - name: multitool
          image: wbitt/network-multitool
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: HTTPS_PORT
              value: "8443"
          volumeMounts:
            - name: shared-data
              mountPath: /shared
